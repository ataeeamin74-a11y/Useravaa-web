components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Error:
      type: object
      required:
      - code
      - messageKey
      properties:
        code:
          type: string
        messageKey:
          type: string
        details:
          type: object
    OrgLevel:
      type: string
      enum:
      - کارآموز
      - کارشناس
      - کارشناس ارشد
      - مدیر میانی
      - مدیر ارشد
      - معاونت
      - مدیر کسب و کار
    ProfileStatus:
      type: string
      enum:
      - draft
      - pending_review
      - needs_changes
      - active
      - inactive
    ExperienceProfile:
      type: object
      properties:
        id:
          type: string
        displayName:
          type: string
        avatarUrl:
          type: string
          nullable: true
        roleTitle:
          type: string
        orgLevel:
          $ref: '#/components/schemas/OrgLevel'
        yearsOfExperience:
          type: integer
        professionalSummary:
          type: string
        freeHelp:
          type: boolean
        price30Toman:
          type: integer
        price60Toman:
          type: integer
        status:
          $ref: '#/components/schemas/ProfileStatus'
        categories:
          type: array
          items:
            type: string
        previousCompanies:
          type: array
          items:
            type: string
        languages:
          type: array
          items:
            type: string
        csatAverage:
          type: number
          nullable: true
        successfulConversationCount:
          type: integer
    ExperienceProfileDraftRequest:
      type: object
      required:
      - displayName
      - roleTitle
      - orgLevel
      - yearsOfExperience
      - professionalSummary
      - categories
      - previousCompanies
      - languages
      - price30Toman
      - price60Toman
      - freeHelp
      properties:
        displayName:
          type: string
          minLength: 2
        avatarUrl:
          type: string
          nullable: true
        roleTitle:
          type: string
          minLength: 2
        orgLevel:
          $ref: '#/components/schemas/OrgLevel'
        yearsOfExperience:
          type: integer
          minimum: 0
          maximum: 40
        professionalSummary:
          type: string
          minLength: 20
          maxLength: 220
        categories:
          type: array
          minItems: 1
          items:
            type: string
        previousCompanies:
          type: array
          minItems: 1
          items:
            type: string
        languages:
          type: array
          minItems: 1
          items:
            type: string
        freeHelp:
          type: boolean
        price30Toman:
          type: integer
          minimum: 0
        price60Toman:
          type: integer
          minimum: 0
    Conversation:
      type: object
      properties:
        id:
          type: string
        status:
          type: string
        durationMinutes:
          type: integer
          enum:
          - 30
          - 60
        priceToman:
          type: integer
        seekerId:
          type: string
        providerId:
          type: string
        profileId:
          type: string
    ProposedTime:
      type: object
      required:
      - shamsiDateLabel
      - timeLabel
      properties:
        id:
          type: string
        shamsiDateLabel:
          type: string
        timeLabel:
          type: string
        isSelected:
          type: boolean
    WalletResponse:
      type: object
      properties:
        balanceToman:
          type: integer
        availablePayoutToman:
          type: integer
        pendingPayoutToman:
          type: integer
        transactions:
          type: array
          items:
            type: object
    SettlementInfoRequest:
      type: object
      required:
