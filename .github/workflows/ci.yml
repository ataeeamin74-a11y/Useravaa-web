name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

env:
  NODE_ENV: test
  APP_ENV: staging
  USERAVAA_SITE_INDEXING: "0"
  USERAVAA_ENABLE_HSTS: "0"
  USERAVAA_ENABLE_DEV_AUTH: "0"
  USERAVAA_ENABLE_ADMIN_DEMO_FALLBACK: "0"
  USERAVAA_ENABLE_STAGING_ACCESS: "0"
  USERAVAA_DB_SMOKE_TEST: "0"
  DATABASE_URL: postgresql://useravaa_ci:useravaa_ci_password@localhost:5432/useravaa_ci?schema=public
  LOG_LEVEL: error

jobs:
  quality-gate:
    name: Quality gate
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: useravaa_ci
          POSTGRES_PASSWORD: useravaa_ci_password
          POSTGRES_DB: useravaa_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U useravaa_ci -d useravaa_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prisma validate
        run: npx prisma validate

      - name: Prisma generate
        run: npx prisma generate

      - name: Prisma migrate deploy
        run: npx prisma migrate deploy

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test -- --pool=threads --maxWorkers=1

      - name: Build
        run: npm run build

      - name: Prisma migrate status
        run: npx prisma migrate status

      - name: Docker build
        run: docker build -t useravaa-web:ci-arvan-staging-check .

      - name: Docker runtime smoke
        env:
          SMOKE_CONTAINER: useravaa-web-ci-smoke
        run: |
          set -euo pipefail

          cleanup() {
            docker rm -f "$SMOKE_CONTAINER" >/dev/null 2>&1 || true
          }

          cleanup
          trap cleanup EXIT

          docker run -d \
            --name "$SMOKE_CONTAINER" \
            -p 3000:3000 \
            -e NODE_ENV=production \
            -e APP_ENV=staging \
            -e USERAVAA_SITE_INDEXING=0 \
            -e USERAVAA_ENABLE_HSTS=0 \
            -e USERAVAA_ENABLE_DEV_AUTH=0 \
            -e USERAVAA_ENABLE_ADMIN_DEMO_FALLBACK=0 \
            -e USERAVAA_ENABLE_STAGING_ACCESS=0 \
            -e USERAVAA_DB_SMOKE_TEST=0 \
            -e LOG_LEVEL=error \
            -e DATABASE_URL="postgresql://useravaa_smoke:useravaa_smoke@127.0.0.1:5432/useravaa_smoke?schema=public" \
            useravaa-web:ci-arvan-staging-check

          sleep 8

          if [ "$(docker inspect -f '{{.State.Running}}' "$SMOKE_CONTAINER")" != "true" ]; then
            docker logs "$SMOKE_CONTAINER"
            exit 1
          fi

          docker logs "$SMOKE_CONTAINER" > /tmp/useravaa-web-ci-smoke.log 2>&1
          if grep -E "Failed to load next\.config|MODULE_NOT_FOUND" /tmp/useravaa-web-ci-smoke.log; then
            cat /tmp/useravaa-web-ci-smoke.log
            exit 1
          fi

      - name: Publish staging image to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          IMAGE_NAME: ghcr.io/ataeeamin74-a11y/useravaa-web
          GHCR_TOKEN: ${{ github.token }}
        run: |
          echo "$GHCR_TOKEN" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
          docker build -t "$IMAGE_NAME:staging" -t "$IMAGE_NAME:${{ github.sha }}" .
          docker push "$IMAGE_NAME:staging"
          docker push "$IMAGE_NAME:${{ github.sha }}"
